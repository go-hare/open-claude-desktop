<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Claude Desktop Shell</title>
    <style>
      html,
      body,
      #titlebar-root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .drag-region {
        position: fixed;
        inset: 0 0 auto 0;
        height: 32px;
        -webkit-app-region: drag;
      }

      .load-error {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: #f7f5ef;
        color: #2f2a24;
      }

      .load-error[data-visible="true"] {
        display: grid;
      }
    </style>
  </head>
  <body>
    <!-- Mirrors original role: title bar and error UI only; main Claude UI is loaded in mainView WebContentsView. -->
    <div id="titlebar-root">
      <div class="drag-region" aria-hidden="true"></div>
      <section id="load-error" class="load-error" role="alert" aria-live="polite">
        <div>
          <h1>Claude will return soon</h1>
          <p>The main view failed to load.</p>
        </div>
      </section>
    </div>
  </body>
</html>
